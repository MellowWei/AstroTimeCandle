<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRO AWAKE | 724Hz Sovereign</title>
    <style>
        :root {
            /* 魏珏然主权色系矩阵 */
            --awake-blue: #83B3BE;    /* 书本雾蓝 */
            --slate-deep: #4A5B61;    /* 深页岩蓝 */
            --aurora-white: #F2F2F2;  /* 极光白 */
            --void-black: #1A1C20;    /* 绝对黑洞 */
            --cement-grey: #96A4A5;   /* 水泥灰 */
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--void-black); font-family: 'Inter', sans-serif; cursor: none; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        /* 14°C 预加载与频率进入协议 */
        #overlay {
            position: fixed; inset: 0; background: var(--void-black);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #enter-btn {
            padding: 12px 40px; border: 1px solid var(--awake-blue); color: var(--awake-blue);
            background: transparent; font-size: 11px; letter-spacing: 0.5em; cursor: pointer;
            transition: all 0.4s; z-index: 101; text-transform: uppercase;
        }
        #enter-btn:hover { background: var(--awake-blue); color: var(--void-black); box-shadow: 0 0 30px var(--awake-blue); }
        
        /* UI 层：非命题式语言 */
        .ui-text { position: absolute; left: 40px; mix-blend-mode: exclusion; pointer-events: none; z-index: 10; }
        .mellow-title { top: 40px; color: var(--awake-blue); font-size: 14px; letter-spacing: 0.6em; text-transform: uppercase; font-weight: 300; }
        .mellow-sub { bottom: 40px; color: var(--aurora-white); font-size: 9px; opacity: 0.5; letter-spacing: 0.3em; }
        
        /* 感质光标：0.724s 延迟引力跟随 */
        #custom-cursor {
            width: 10px; height: 10px; background: var(--awake-blue); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 10000;
            filter: blur(2px); transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    
    <div id="overlay">
        <div style="margin-bottom: 30px; width: 2px; height: 40px; background: var(--awake-blue); opacity: 0.3;"></div>
        <button id="enter-btn">ENTER 724Hz</button>
    </div>

    <div class="ui-text mellow-title">Astro Time Candle</div>
    <div class="ui-text mellow-sub">Variable S Active / 14.0°C / Philadelphia / Architect: Wei Jueran</div>
    
    <div id="canvas-container"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.161.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const container = document.getElementById('canvas-container');
        const overlay = document.getElementById('overlay');
        const enterBtn = document.getElementById('enter-btn');
        const cursor = document.getElementById('custom-cursor');

        let scene, camera, renderer, candle, particles, analyser, sound;
        let isStarted = false;

        // 724Hz 延迟跟随光标逻辑
        window.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 1. Astro Time Candle 核心：#83B3BE (书本雾蓝)
            const candleGeo = new THREE.CylinderGeometry(1, 1, 3, 64);
            const candleMat = new THREE.MeshPhysicalMaterial({
                color: 0x83B3BE,
                transmission: 0.85, 
                roughness: 0.14, // 14°C 磨砂质感
                thickness: 2,
                attenuationColor: 0x4A5B61, // 内部向深页岩蓝坍缩
                attenuationDistance: 0.6,
                emissive: 0x83B3BE,
                emissiveIntensity: 0.1
            });
            candle = new THREE.Mesh(candleGeo, candleMat);
            scene.add(candle);

            // 2. 引力底座：#4A5B61 (暗页岩蓝) + #96A4A5 (水泥灰)
            const baseGeo = new THREE.BoxGeometry(2.8, 0.5, 2.8);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x4A5B61, roughness: 0.9, metalness: 0.2 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = -1.8;
            scene.add(base);

            // 3. 724Hz 时间粒子：2000-07-16 频率分布
            const partGeo = new THREE.BufferGeometry();
            const pos = new Float32Array(724 * 3);
            for(let i=0; i<724*3; i++) pos[i] = (Math.random()-0.5)*12;
            partGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            particles = new THREE.Points(partGeo, new THREE.PointsMaterial({ color: 0xF2F2F2, size: 0.04, transparent: true, opacity: 0.4 }));
            scene.add(particles);

            // 4. 音频采样接入：winter_sun.m4a
            const listener = new THREE.AudioListener();
            camera.add(listener);
            sound = new THREE.Audio(listener);
            const audioLoader = new THREE.AudioLoader();
            audioLoader.load('winter_sun.m4a', (buffer) => {
                sound.setBuffer(buffer);
                sound.setLoop(true);
                sound.setVolume(0.5);
            });
            analyser = new THREE.AudioAnalyser(sound, 32);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // 724Hz/427Hz 频率旋转
            candle.rotation.y += 0.00724;
            particles.rotation.y -= 0.00427;
            
            // 音乐波形实时驱动感质强度
            if (isStarted && analyser) {
                const freq = analyser.getAverageFrequency();
                // 雾蓝随 winter_sun 呼吸坍缩
                candle.material.emissiveIntensity = 0.1 + (freq / 110);
                particles.position.y = Math.sin(Date.now()*0.001) * (freq/140);
            }
            renderer.render(scene, camera);
        }

        // 主权开关：点击点燃 724Hz 之火
        enterBtn.addEventListener('click', () => {
            isStarted = true;
            if (sound) sound.play();
            overlay.style.opacity = '0';
            setTimeout(() => overlay.remove(), 1000);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
