<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Time Candle | Time, Revealed</title>
    <style>
        :root {
            --awake-blue: #83B3BE; --slate-deep: #4A5B61;
            --aurora-white: #F2F2F2; --void-black: #0D0E10;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--void-black); color: var(--aurora-white); font-family: 'Inter', sans-serif; overflow-x: hidden; cursor: crosshair; }
        
        /* 交互遮罩：强制解锁声音 */
        #overlay {
            position: fixed; inset: 0; background: var(--void-black);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1s ease;
        }
        .cta-btn {
            padding: 1rem 2.5rem; border: 1px solid var(--awake-blue);
            background: transparent; color: var(--awake-blue);
            text-transform: uppercase; letter-spacing: 0.3em; cursor: pointer;
            transition: 0.724s ease;
        }
        .cta-btn:hover { background: var(--awake-blue); color: var(--void-black); box-shadow: 0 0 30px var(--awake-blue); }

        .container { scroll-snap-type: y mandatory; height: 100vh; overflow-y: scroll; }
        section { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 0 10%; scroll-snap-align: start; position: relative; }
        #canvas-container { position: fixed; top: 0; right: 0; width: 50vw; height: 100vh; z-index: 1; pointer-events: none; }
        .content { max-width: 600px; z-index: 2; }
        h1 { font-size: clamp(2rem, 5vw, 4rem); letter-spacing: 0.3em; text-transform: uppercase; color: var(--awake-blue); font-weight: 200; }
        p { font-size: 1rem; opacity: 0.7; max-width: 450px; margin-bottom: 2rem; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="enter-btn" class="cta-btn">Unlock 724Hz Experience</button>
    </div>

    <div id="canvas-container"></div>

    <div class="container">
        <section id="hero">
            <div class="content">
                <h1>Astro Time Candle</h1>
                <p>Time, Revealed — Not Counted. A physical instrument for focus in a digital world.</p>
            </div>
        </section>
        <section id="how-it-works">
            <div class="content">
                <h1 style="font-size: 2rem;">The Unfolding</h1>
                <p>As the outer layer melts, a stable inner core is revealed. Time feels like something that unfolds, not something you lose.</p>
            </div>
        </section>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.161.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        const enterBtn = document.getElementById('enter-btn');
        const overlay = document.getElementById('overlay');
        const container = document.getElementById('canvas-container');

        let scene, camera, renderer, candle, sound, analyser;
        let isAwake = false;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, container.offsetWidth / container.offsetHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            container.appendChild(renderer.domElement);

            // 蜡烛感质：#83B3BE
            const geometry = new THREE.CylinderGeometry(1, 1.2, 4, 32);
            const material = new THREE.MeshPhysicalMaterial({
                color: 0x83B3BE, transmission: 0.9, roughness: 0.2,
                emissive: 0x83B3BE, emissiveIntensity: 0.1
            });
            candle = new THREE.Mesh(geometry, material);
            scene.add(candle);

            camera.position.z = 8;

            // 音频系统：3.0x 增益补偿
            const listener = new THREE.AudioListener();
            camera.add(listener);
            sound = new THREE.Audio(listener);
            
            const gainNode = listener.context.createGain();
            gainNode.gain.setValueAtTime(3.0, listener.context.currentTime); 
            sound.setNodeSource(gainNode);

            const audioLoader = new THREE.AudioLoader();
            audioLoader.load('winter_sun.m4a', (buffer) => {
                sound.setBuffer(buffer);
                sound.setLoop(true);
                sound.setVolume(1.0);
            });
            analyser = new THREE.AudioAnalyser(sound, 32);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            candle.rotation.y += 0.00724; 
            if (isAwake && analyser) {
                const freq = analyser.getAverageFrequency();
                candle.material.emissiveIntensity = 0.1 + (freq / 100);
            }
            renderer.render(scene, camera);
        }

        // 核心交互：强制点燃频率
        enterBtn.addEventListener('click', () => {
            isAwake = true;
            if (THREE.AudioContext.getContext().state === 'suspended') {
                THREE.AudioContext.getContext().resume();
            }
            if (sound) sound.play();
            overlay.style.opacity = '0';
            setTimeout(() => overlay.remove(), 1000);
        });

        init();
    </script>
</body>
</html>
