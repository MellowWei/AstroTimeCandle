<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRO AWAKE | 724Hz Sovereign</title>
    <style>
        :root {
            --awake-blue: #83B3BE;
            --slate-deep: #4A5B61;
            --aurora-white: #F2F2F2;
            --void-black: #1A1C20;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            background: var(--void-black);
            font-family: 'Inter', sans-serif;
            cursor: none;
            color: var(--aurora-white);
            scroll-behavior: smooth;
            overflow: hidden;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        #overlay-entry {
            position: fixed;
            inset: 0;
            background: var(--void-black);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn {
            padding: 12px 40px;
            border: 1px solid var(--awake-blue);
            color: var(--awake-blue);
            background: transparent;
            font-size: 11px;
            letter-spacing: 0.5em;
            cursor: pointer;
            transition: all 0.4s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--awake-blue);
            color: var(--void-black);
            box-shadow: 0 0 30px var(--awake-blue);
        }

        #custom-cursor {
            width: 8px;
            height: 8px;
            background: var(--awake-blue);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            filter: blur(1px);
            transition: transform 0.1s linear;
            opacity: 0.8;
        }

        .status {
            margin-top: 20px;
            font-size: 9px;
            letter-spacing: 0.2em;
            opacity: 0.5;
            transition: color 0.3s;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div id="canvas-container"></div>

    <div id="overlay-entry">
        <div style="margin-bottom: 30px; width: 1px; height: 60px; background: var(--awake-blue); opacity: 0.4;"></div>
        <button id="enter-btn" class="btn">ENTER 724Hz</button>
        <p id="status-text" class="status">INITIALIZING FREQUENCY...</p>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.161.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const entry = document.getElementById('overlay-entry');
        const enterBtn = document.getElementById('enter-btn');
        const statusText = document.getElementById('status-text');
        const cursor = document.getElementById('custom-cursor');
        const canvasContainer = document.getElementById('canvas-container');

        let scene, camera, renderer, candle, particles, analyser, sound;
        let isStarted = false;
        let audioLoaded = false;

        const AUDIO_URL = '/AstroTimeCandle/winter_sun.m4a';

        window.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        function initScene() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            canvasContainer.appendChild(renderer.domElement);

            // Candle
            const candleGeo = new THREE.CylinderGeometry(1, 1, 3, 64);
            const candleMat = new THREE.MeshPhysicalMaterial({
                color: 0x83B3BE,
                transmission: 0.85,
                roughness: 0.14,
                thickness: 2,
                emissive: 0x83B3BE,
                emissiveIntensity: 0.1
            });
            candle = new THREE.Mesh(candleGeo, candleMat);
            scene.add(candle);

            // Particles
            const partGeo = new THREE.BufferGeometry();
            const pos = new Float32Array(724 * 3);
            for (let i = 0; i < 724 * 3; i++) {
                pos[i] = (Math.random() - 0.5) * 12;
            }
            partGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

            const partMat = new THREE.PointsMaterial({
                color: 0xF2F2F2,
                size: 0.04,
                transparent: true,
                opacity: 0.4
            });

            particles = new THREE.Points(partGeo, partMat);
            scene.add(particles);
        }

        function initAudio() {
            const listener = new THREE.AudioListener();
            camera.add(listener);

            sound = new THREE.Audio(listener);
            analyser = new THREE.AudioAnalyser(sound, 32);

            const audioLoader = new THREE.AudioLoader();

            statusText.innerText = 'LOADING AUDIO...';

            audioLoader.load(
                AUDIO_URL,
                (buffer) => {
                    sound.setBuffer(buffer);
                    sound.setLoop(true);
                    sound.setVolume(1.0);
                    audioLoaded = true;
                    statusText.innerText = '724Hz ALIGNED. READY TO AWAKE.';
                    statusText.style.color = '#83B3BE';
                    console.log('Audio loaded successfully:', AUDIO_URL);
                },
                undefined,
                (err) => {
                    audioLoaded = false;
                    statusText.innerText = 'AUDIO LOAD ERROR.';
                    statusText.style.color = '#FF4444';
                    console.error('Audio load failed:', err);
                }
            );
        }

        function animate() {
            requestAnimationFrame(animate);

            if (candle) {
                candle.rotation.y += 0.00724;
            }

            if (particles) {
                particles.rotation.y -= 0.00427;
            }

            if (isStarted && analyser && sound && sound.isPlaying) {
                const freq = analyser.getAverageFrequency();
                candle.material.emissiveIntensity = 0.1 + (freq / 100);
            }

            renderer.render(scene, camera);
        }

        async function startExperience() {
            console.log('Attempting to start audio...');
            isStarted = true;

            try {
                const context = THREE.AudioContext.getContext();

                if (context.state === 'suspended') {
                    await context.resume();
                    console.log('AudioContext resumed');
                }

                if (audioLoaded && sound && !sound.isPlaying) {
                    sound.play();
                    console.log('Audio playing');
                } else {
                    console.log('Audio not ready yet:', { audioLoaded, hasSound: !!sound });
                }
            } catch (e) {
                console.error('Audio start failed:', e);
            }

            // 保留你原来的交互
            entry.style.opacity = '0';
            setTimeout(() => {
                entry.remove();
            }, 1200);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        enterBtn.addEventListener('click', startExperience);
        window.addEventListener('resize', onResize);

        initScene();
        initAudio();
        animate();
    </script>
</body>
</html>
