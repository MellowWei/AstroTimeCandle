<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRO AWAKE | 724Hz Sovereign</title>
    
    <meta name="author" content="Jueran Wei">
    <meta name="theme-color" content="#4A5B61">
    
    <link rel="stylesheet" href="Global_Qualia.css">
    
    <style>
        /* 14°C 预加载层：确保首屏即是极致质感 */
        #loader {
            position: fixed;
            inset: 0;
            background: #1A1C20;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.724s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .loading-dot {
            width: 8px;
            height: 8px;
            background: #83B3BE;
            border-radius: 50%;
            box-shadow: 0 0 20px #83B3BE;
            animation: pulse 1.4s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.5); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loading-dot"></div>
    </div>

    <main id="app" class="canvas-container"></main>

    <div class="ui-overlay">
        <h1 class="mellow-text">Astro Time Candle</h1>
        <p class="mellow-text" style="font-size: 8px; opacity: 0.4;">
            Variable S Active / 14.0°C / Philadelphia
        </p>
    </div>

    <script type="module">
        import AstroAwakeEngine from './AstroAwake_724Hz.js';
        
        window.addEventListener('load', () => {
            const container = document.getElementById('app');
            new AstroAwakeEngine(container);
            
            // 延迟关闭加载层，保持 Mellow Reflective 节奏
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 724);
            }, 1000);
        });
    </script>
</body>
</html>
