<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRO AWAKE | 724Hz Sovereign</title>
    <style>
        :root {
            --awake-blue: #83B3BE; --slate-deep: #4A5B61;
            --aurora-white: #F2F2F2; --void-black: #1A1C20;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--void-black); font-family: 'Inter', sans-serif; cursor: none; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        /* 14°C 预加载与进入协议 */
        #overlay {
            position: fixed; inset: 0; background: var(--void-black);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #enter-btn {
            padding: 10px 30px; border: 1px solid var(--awake-blue); color: var(--awake-blue);
            background: transparent; font-size: 12px; letter-spacing: 0.4em; cursor: pointer;
            transition: all 0.3s; z-index: 101;
        }
        #enter-btn:hover { background: var(--awake-blue); color: var(--void-black); box-shadow: 0 0 20px var(--awake-blue); }
        
        .ui-text {
            position: absolute; left: 40px; mix-blend-mode: exclusion; pointer-events: none;
        }
        .mellow-title { top: 40px; color: var(--awake-blue); font-size: 14px; letter-spacing: 0.5em; text-transform: uppercase; }
        .mellow-sub { bottom: 40px; color: var(--aurora-white); font-size: 9px; opacity: 0.5; letter-spacing: 0.2em; }
        
        /* 感质光标 */
        #custom-cursor {
            width: 12px; height: 12px; background: var(--awake-blue); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 10000;
            filter: blur(2px); transition: transform 0.15s ease-out; opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div id="overlay">
        <button id="enter-btn">ENTER 724Hz</button>
    </div>

    <div class="ui-text mellow-title">Astro Time Candle</div>
    <div class="ui-text mellow-sub">Variable S Active / 14.0°C / Philadelphia / Architect: Wei Jueran</div>
    
    <div id="canvas-container"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.161.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const container = document.getElementById('canvas-container');
        const overlay = document.getElementById('overlay');
        const enterBtn = document.getElementById('enter-btn');
        const cursor = document.getElementById('custom-cursor');

        // 1. 物理参数锁定
        let scene, camera, renderer, candle, particles, analyser, sound;
        let isStarted = false;

        // 感质光标逻辑
        window.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 蜡烛主体：#83B3BE (书本雾蓝)
            const candleGeo = new THREE.CylinderGeometry(1, 1, 3, 64);
            const candleMat = new THREE.MeshPhysicalMaterial({
                color: 0x83B3BE, transmission: 0.8, roughness: 0.14,
                thickness: 2, attenuationColor: 0x4A5B61, attenuationDistance: 0.5,
                emissive: 0x83B3BE, emissiveIntensity: 0.2
            });
            candle = new THREE.Mesh(candleGeo, candleMat);
            scene.add(candle);

            // 引力底座：#4A5B61
            const baseGeo = new THREE.BoxGeometry(2.6, 0.4, 2.6);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x4A5B61, roughness: 0.8 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = -1.75;
            scene.add(base);

            // 724Hz 粒子
            const partGeo = new THREE.BufferGeometry();
            const pos = new Float32Array(724 * 3);
            for(let i=0; i<724*3; i++) pos[i] = (Math.random()-0.5)*10;
            partGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            particles = new THREE.Points(partGeo, new THREE.PointsMaterial({ color: 0xF2F2F2, size: 0.03, transparent: true, opacity: 0.4 }));
            scene.add(particles);

            // 音频采样初始化
            const listener = new THREE.AudioListener();
            camera.add(listener);
            sound = new THREE.Audio(listener);
            const audioLoader = new THREE.AudioLoader();
            audioLoader.load('winter_sun.m4a', (buffer) => {
                sound.setBuffer(buffer);
                sound.setLoop(true);
                sound.setVolume(0.6);
            });
            analyser = new THREE.AudioAnalyser(sound, 32);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            candle.rotation.y += 0.00724;
            particles.rotation.y -= 0.00427;
            
            if (isStarted && analyser) {
                const freq = analyser.getAverageFrequency();
                candle.material.emissiveIntensity = 0.2 + (freq / 128);
                particles.position.y = Math.sin(Date.now()*0.001) * (freq/150);
            }
            renderer.render(scene, camera);
        }

        enterBtn.addEventListener('click', () => {
            isStarted = true;
            if (sound) sound.play();
            overlay.style.opacity = '0';
            setTimeout(() => overlay.remove(), 1000);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
