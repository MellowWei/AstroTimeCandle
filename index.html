<script type="module">
    import * as THREE from 'three';

    const enterBtn = document.getElementById('enter-btn');
    const statusText = document.getElementById('status-text');
    const container = document.getElementById('canvas-container');

    let scene, camera, renderer, candleShell, candleCore, sound, analyser, isStarted = false;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // --- 物理实体设计 ---
        const candleGroup = new THREE.Group();
        
        // 内芯：深页岩蓝金属
        const coreGeo = new THREE.CylinderGeometry(0.4, 0.4, 2.8, 32);
        const coreMat = new THREE.MeshStandardMaterial({ color: 0x4A5B61, metalness: 0.9, roughness: 0.1 });
        candleCore = new THREE.Mesh(coreGeo, coreMat);
        
        // 外壳：书本雾蓝磨砂
        const shellGeo = new THREE.CylinderGeometry(1, 1, 3, 64);
        const shellMat = new THREE.MeshPhysicalMaterial({
            color: 0x83B3BE, transmission: 0.8, roughness: 0.14, thickness: 2,
            transparent: true, opacity: 0.9, emissive: 0x83B3BE, emissiveIntensity: 0.1
        });
        candleShell = new THREE.Mesh(shellGeo, shellMat);
        
        candleGroup.add(candleCore);
        candleGroup.add(candleShell);
        scene.add(candleGroup);

        // --- 300% 暴力音频增益 ---
        const listener = new THREE.AudioListener();
        camera.add(listener);
        sound = new THREE.Audio(listener);
        const gainNode = listener.context.createGain();
        gainNode.gain.setValueAtTime(3.0, listener.context.currentTime); // 3.0x Power
        sound.setNodeSource(gainNode);

        const audioLoader = new THREE.AudioLoader();
        audioLoader.load('https://mellowwei.github.io/AstroTimeCandle/winter_sun.m4a', (buffer) => {
            sound.setBuffer(buffer);
            sound.setLoop(true);
            statusText.innerText = "724Hz ALIGNED. READY TO AWAKE.";
            statusText.style.color = "#83B3BE";
        });

        analyser = new THREE.AudioAnalyser(sound, 32);
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if(candleShell) candleShell.rotation.y += 0.00724;
        if(candleCore) candleCore.rotation.y += 0.00427;
        
        if (isStarted && analyser) {
            const freq = analyser.getAverageFrequency();
            candleShell.material.emissiveIntensity = 0.1 + (freq / 100);
        }
        renderer.render(scene, camera);
    }

    enterBtn.addEventListener('click', async () => {
        const context = THREE.AudioContext.getContext();
        await context.resume();
        if (sound && sound.buffer) {
            isStarted = true;
            sound.play();
            document.getElementById('overlay-entry').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay-entry').remove(), 1200);
        }
    });

    init();
</script>
