<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Astro Time Candle</title>

<style>
:root {
  --blue: #83B3BE;
  --white: #F2F2F2;
  --black: #1A1C20;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--black);
  color:var(--white);
  font-family: Inter, sans-serif;
}

/* 粒子层 */
#canvas {
  position:fixed;
  inset:0;
  z-index:0;
}

/* 产品图片 */
#product {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:min(42vw,520px);
  z-index:2;
  pointer-events:none;
  opacity:0;

  filter:
    drop-shadow(0 0 40px rgba(131,179,190,0.35))
    drop-shadow(0 0 120px rgba(131,179,190,0.2));

  transition: all 1.2s ease;
}

body.started #product {
  opacity:1;
}

/* 进入层 */
#enter {
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:var(--black);
  z-index:10;
}

button {
  border:1px solid var(--blue);
  color:var(--blue);
  background:none;
  padding:12px 40px;
  letter-spacing:0.5em;
  cursor:pointer;
}

button:hover {
  background:var(--blue);
  color:black;
}

/* 文案层 */
#panel {
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:3;
}

.card {
  position:absolute;
  text-align:center;
  max-width:700px;

  opacity:0;
  transform:translateY(40px);
  filter:blur(10px);

  transition: all .6s ease;
}

.card.active {
  opacity:1;
  transform:translateY(0);
  filter:blur(0);
}

.card.exit {
  opacity:0;
  transform:translateY(-40px);
  filter:blur(12px);
}

h1 {
  color:var(--blue);
  letter-spacing:.3em;
  margin-bottom:20px;
}

p {
  line-height:1.8;
  opacity:.8;
}

/* 滚动提示 */
#hint {
  position:fixed;
  bottom:40px;
  right:40px;
  font-size:10px;
  letter-spacing:.3em;
  color:var(--blue);
  opacity:0;
}

/* dots */
#dots {
  position:fixed;
  right:40px;
  top:50%;
  transform:translateY(-50%);
  display:none;
}

.dot {
  width:6px;
  height:6px;
  background:white;
  opacity:.2;
  border-radius:50%;
  margin:10px 0;
}

.dot.active {
  background:var(--blue);
  opacity:1;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<!-- 产品图片 -->
<img id="product" src="./Astro%20Time%20Candle.png" />

<!-- 音频 -->
<audio id="audio" loop>
  <source src="https://mellowwei.github.io/AstroTimeCandle/winter_sun.m4a" type="audio/mp4">
</audio>

<!-- 进入 -->
<div id="enter">
  <button id="start">ENTER</button>
</div>

<!-- 文案 -->
<div id="panel">

<div class="card active">
<h1>ASTRO TIME CANDLE</h1>
<p>Time, Revealed — Not Counted.</p>
</div>

<div class="card">
<h1>MECHANISM</h1>
<p>The outer wax yields.  
The inner truth appears.</p>
</div>

<div class="card">
<h1>NO VESSEL</h1>
<p>The body itself is the boundary.</p>
</div>

<div class="card">
<h1>CONTRACT</h1>
<p>Time observes you.</p>
</div>

<div class="card">
<h1>USE</h1>
<p>Focus. Night. Duration.</p>
</div>

</div>

<div id="dots"></div>
<div id="hint">SCROLL</div>

<script>
const startBtn = document.getElementById('start');
const enter = document.getElementById('enter');
const panel = document.getElementById('panel');
const cards = document.querySelectorAll('.card');
const dotsWrap = document.getElementById('dots');
const hint = document.getElementById('hint');
const audio = document.getElementById('audio');

let index = 0;
let locked = false;

/* dots */
cards.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot'+(i===0?' active':'');
  dotsWrap.appendChild(d);
});

const dots=document.querySelectorAll('.dot');

/* start */
startBtn.onclick = async ()=>{
  document.body.classList.add('started');

  enter.style.opacity=0;
  setTimeout(()=>enter.remove(),800);

  panel.style.display='flex';
  dotsWrap.style.display='block';
  hint.style.opacity=.8;

  try{
    await audio.play();
  }catch(e){}
};

/* 切换 */
function show(i){
  if(i<0||i>=cards.length)return;

  const current = cards[index];
  const next = cards[i];

  current.classList.remove('active');
  current.classList.add('exit');

  setTimeout(()=>{
    current.classList.remove('exit');

    next.classList.add('active');
    index=i;

    dots.forEach((d,k)=>{
      d.classList.toggle('active',k===index);
    });

  },400);
}

/* 滚轮 */
window.addEventListener('wheel',(e)=>{
  if(locked)return;
  locked=true;

  if(e.deltaY>0) show(index+1);
  else show(index-1);

  setTimeout(()=>locked=false,700);
});
</script>

</body>
</html>
