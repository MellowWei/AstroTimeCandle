<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRO TIME CANDLE | 724Hz Sovereign</title>
    <style>
        :root {
            --awake-blue: #83B3BE;
            --slate-deep: #4A5B61;
            --aurora-white: #F2F2F2;
            --void-black: #1A1C20;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background: var(--void-black);
            font-family: 'Inter', sans-serif;
            cursor: none;
            color: var(--aurora-white);
            overflow: hidden;
        }

        #canvas-container { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* Entry overlay */
        #overlay-entry {
            position: fixed; inset: 0;
            background: var(--void-black);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn {
            padding: 12px 40px;
            border: 1px solid var(--awake-blue);
            color: var(--awake-blue);
            background: transparent;
            font-size: 11px;
            letter-spacing: 0.5em;
            cursor: pointer;
            transition: all 0.4s;
            text-transform: uppercase;
            margin: 10px;
        }
        .btn:hover {
            background: var(--awake-blue);
            color: var(--void-black);
            box-shadow: 0 0 30px var(--awake-blue);
        }

        .status {
            margin-top: 20px;
            font-size: 9px;
            letter-spacing: 0.2em;
            opacity: 0.5;
            transition: color 0.3s;
        }

        /* UI labels */
        .ui-text {
            position: absolute;
            left: 40px;
            mix-blend-mode: exclusion;
            pointer-events: none;
            z-index: 10;
        }
        .mellow-title {
            top: 40px;
            color: var(--awake-blue);
            font-size: 14px;
            letter-spacing: 0.6em;
            text-transform: uppercase;
        }
        .mellow-sub {
            bottom: 40px;
            color: var(--aurora-white);
            font-size: 9px;
            opacity: 0.5;
            letter-spacing: 0.3em;
        }

        #custom-cursor {
            width: 8px; height: 8px;
            background: var(--awake-blue);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            filter: blur(1px);
            transition: transform 0.1s linear;
            opacity: 0.8;
            /* offset so cursor center aligns with pointer */
            margin-left: -4px;
            margin-top: -4px;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div id="canvas-container"></div>

    <div id="overlay-entry">
        <div style="margin-bottom: 30px; width: 1px; height: 60px; background: var(--awake-blue); opacity: 0.4;"></div>
        <button id="enter-btn" class="btn">ENTER 724Hz</button>
        <p id="status-text" class="status">CALIBRATING FREQUENCY...</p>
    </div>

    <div class="ui-text mellow-title">Astro Time Candle</div>
    <div class="ui-text mellow-sub">Architect: Wei Jueran | Philadelphia | 14.0°C</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.161.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const entry = document.getElementById('overlay-entry');
        const enterBtn = document.getElementById('enter-btn');
        const statusText = document.getElementById('status-text');
        const cursor = document.getElementById('custom-cursor');

        let scene, camera, renderer, candle, particles, analyser, sound, audioBuffer;
        let isStarted = false;

        // Custom cursor
        window.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Candle body
            const candleGeo = new THREE.CylinderGeometry(1, 1, 3, 64);
            const candleMat = new THREE.MeshPhysicalMaterial({
                color: 0x83B3BE,
                transmission: 0.85,
                roughness: 0.14,
                thickness: 2,
                emissive: 0x83B3BE,
                emissiveIntensity: 0.1
            });
            candle = new THREE.Mesh(candleGeo, candleMat);
            scene.add(candle);

            // Ambient light so the candle is visible
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0x83B3BE, 2, 20);
            pointLight.position.set(3, 3, 3);
            scene.add(pointLight);

            // 724 particle system
            const partGeo = new THREE.BufferGeometry();
            const pos = new Float32Array(724 * 3);
            for (let i = 0; i < 724 * 3; i++) pos[i] = (Math.random() - 0.5) * 12;
            partGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            particles = new THREE.Points(partGeo, new THREE.PointsMaterial({
                color: 0xF2F2F2, size: 0.04, transparent: true, opacity: 0.4
            }));
            scene.add(particles);

            // ── Audio ──────────────────────────────────────────────
            // FIX: removed the broken gainNode setNodeSource pattern.
            // THREE.Audio manages its own source node internally via setBuffer().
            // Volume is controlled with setVolume() after setBuffer().
            const listener = new THREE.AudioListener();
            camera.add(listener);
            sound = new THREE.Audio(listener);

            analyser = new THREE.AudioAnalyser(sound, 32);

            const audioLoader = new THREE.AudioLoader();
            audioLoader.load(
                './winter_sun.m4a',
                (buffer) => {
                    audioBuffer = buffer;
                    sound.setBuffer(buffer);
                    sound.setLoop(true);
                    sound.setVolume(1.0);   // ← clean volume control
                    statusText.innerText = '724Hz ALIGNED. READY TO AWAKE.';
                    statusText.style.color = '#83B3BE';
                    statusText.style.opacity = '1';
                },
                (xhr) => {
                    const pct = Math.round((xhr.loaded / xhr.total) * 100);
                    statusText.innerText = `LOADING AUDIO... ${pct}%`;
                },
                (err) => {
                    console.error('Audio load error:', err);
                    statusText.innerText = 'AUDIO UNAVAILABLE — VISUAL MODE';
                    statusText.style.color = '#FFBB00';
                    statusText.style.opacity = '1';
                    // Allow entering without audio
                    enterBtn.innerText = 'ENTER (SILENT)';
                }
            );
            // ──────────────────────────────────────────────────────

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            candle.rotation.y += 0.00724;
            particles.rotation.y -= 0.00427;

            if (isStarted && analyser) {
                const freq = analyser.getAverageFrequency();
                candle.material.emissiveIntensity = 0.1 + freq / 100;
            }

            renderer.render(scene, camera);
        }

        enterBtn.addEventListener('click', async () => {
            // FIX: always resume AudioContext on user gesture (required by all browsers)
            const context = THREE.AudioContext.getContext();
            if (context.state === 'suspended') {
                await context.resume();
            }

            if (audioBuffer && !sound.isPlaying) {
                sound.play();
            }

            // Enter regardless of audio state
            isStarted = true;
            entry.style.opacity = '0';
            setTimeout(() => entry.style.display = 'none', 1200);
        });

        init();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
