<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRO AWAKE | 724Hz Sovereign</title>
    <style>
        :root { --awake-blue: #83B3BE; --slate-deep: #4A5B61; --aurora-white: #F2F2F2; --void-black: #1A1C20; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: var(--void-black); font-family: 'Inter', sans-serif; cursor: none; color: var(--aurora-white); overflow: hidden; }
        #canvas-container { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        #overlay-entry { position: fixed; inset: 0; background: var(--void-black); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn { padding: 12px 40px; border: 1px solid var(--awake-blue); color: var(--awake-blue); background: transparent; font-size: 11px; letter-spacing: 0.5em; cursor: pointer; transition: all 0.4s; text-transform: uppercase; z-index: 101; }
        .btn:hover { background: var(--awake-blue); color: var(--void-black); box-shadow: 0 0 30px var(--awake-blue); }
        .status { margin-top: 20px; font-size: 9px; letter-spacing: 0.2em; opacity: 0.3; }
        .ui-text { position: absolute; left: 40px; mix-blend-mode: exclusion; pointer-events: none; z-index: 10; }
        .mellow-title { top: 40px; color: var(--awake-blue); font-size: 14px; letter-spacing: 0.6em; text-transform: uppercase; }
        .mellow-sub { bottom: 40px; color: var(--aurora-white); font-size: 9px; opacity: 0.5; letter-spacing: 0.3em; }
        #custom-cursor { width: 8px; height: 8px; background: var(--awake-blue); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; filter: blur(1px); transition: transform 0.1s linear; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div id="canvas-container"></div>

    <div id="overlay-entry">
        <div style="margin-bottom: 30px; width: 1px; height: 60px; background: var(--awake-blue); opacity: 0.4;"></div>
        <button id="enter-btn" class="btn">ENTER 724Hz</button>
        <p id="status-text" class="status">SYNCING WITH SINGULARITY...</p>
    </div>

    <div class="ui-text mellow-title">Astro Time Candle</div>
    <div class="ui-text mellow-sub">Architect: Wei Jueran | Philadelphia | 14.0°C</div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.161.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const entry = document.getElementById('overlay-entry');
        const enterBtn = document.getElementById('enter-btn');
        const statusText = document.getElementById('status-text');
        const cursor = document.getElementById('custom-cursor');

        let scene, camera, renderer, candleShell, candleCore, particles;
        let sound, analyser, listener, isStarted = false;

        window.addEventListener('mousemove', (e) => { cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`; });

        function initVisuals() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 蜡烛实体 (巨化版)
            const candleGroup = new THREE.Group();
            candleCore = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 8.4, 32), new THREE.MeshStandardMaterial({ color: 0x4A5B61, metalness: 0.9, roughness: 0.1 }));
            candleShell = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 9, 64), new THREE.MeshPhysicalMaterial({ color: 0x83B3BE, transmission: 0.8, roughness: 0.14, thickness: 6, transparent: true, opacity: 0.9, emissive: 0x83B3BE, emissiveIntensity: 0.1 }));
            candleGroup.add(candleCore, candleShell);
            scene.add(candleGroup);

            // 梦幻星云粒子
            const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            grad.addColorStop(0, 'rgba(242, 242, 242, 1)'); grad.addColorStop(0.2, 'rgba(131, 179, 190, 0.6)'); grad.addColorStop(0.6, 'rgba(26, 28, 32, 0)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, 64, 64);
            const tex = new THREE.CanvasTexture(canvas);

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(10000 * 3);
            for (let i = 0; i < 30000; i++) pos[i] = (Math.random() - 0.5) * 80;
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            particles = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.6, map: tex, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true }));
            scene.add(particles);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(candleShell) candleShell.rotation.y += 0.00724;
            if(particles) { particles.rotation.y += 0.0003; particles.rotation.x += 0.0001; }
            if (isStarted && analyser) {
                const freq = analyser.getAverageFrequency();
                candleShell.material.emissiveIntensity = 0.1 + (freq / 80);
            }
            renderer.render(scene, camera);
        }

        // 核心点火逻辑：强制在点击后初始化所有音频链条
        enterBtn.addEventListener('click', () => {
            isStarted = true;
            
            // 1. 瞬间拆除遮罩
            entry.style.opacity = '0';
            setTimeout(() => entry.remove(), 1200);

            // 2. 强制初始化 AudioListener (必须在交互事件内)
            if (!listener) {
                listener = new THREE.AudioListener();
                camera.add(listener);
                
                // 暴力唤醒 Context
                if (listener.context.state === 'suspended') {
                    listener.context.resume();
                }

                sound = new THREE.Audio(listener);
                const audioLoader = new THREE.AudioLoader();
                const url = 'https://mellowwei.github.io/AstroTimeCandle/winter_sun.m4a?v=' + Date.now();

                audioLoader.load(url, (buffer) => {
                    sound.setBuffer(buffer);
                    sound.setLoop(true);
                    
                    // 极致增益链条
                    const gain = listener.context.createGain();
                    gain.gain.setValueAtTime(4.0, listener.context.currentTime); 
                    sound.setNodeSource(gain);
                    
                    sound.play();
                    analyser = new THREE.AudioAnalyser(sound, 32);
                    console.log("724Hz Frequency Ignited.");
                });
            }
        });

        initVisuals();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
