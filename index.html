<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRO AWAKE | 724Hz Sovereign</title>
    <style>
        :root {
            --awake-blue: #83B3BE; --slate-deep: #4A5B61;
            --aurora-white: #F2F2F2; --void-black: #1A1C20;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; background: var(--void-black); 
            font-family: 'Inter', sans-serif; cursor: none;
            color: var(--aurora-white); overflow: hidden;
        }
        #canvas-container { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        #overlay-entry {
            position: fixed; inset: 0; background: var(--void-black);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn {
            padding: 12px 40px; border: 1px solid var(--awake-blue); color: var(--awake-blue);
            background: transparent; font-size: 11px; letter-spacing: 0.5em; cursor: pointer;
            transition: all 0.4s; text-transform: uppercase; margin: 10px;
        }
        .btn:hover { background: var(--awake-blue); color: var(--void-black); box-shadow: 0 0 30px var(--awake-blue); }
        .status { margin-top: 20px; font-size: 9px; letter-spacing: 0.2em; opacity: 0.5; transition: color 0.3s; }
        .ui-text { position: absolute; left: 40px; mix-blend-mode: exclusion; pointer-events: none; z-index: 10; }
        .mellow-title { top: 40px; color: var(--awake-blue); font-size: 14px; letter-spacing: 0.6em; text-transform: uppercase; }
        .mellow-sub { bottom: 40px; color: var(--aurora-white); font-size: 9px; opacity: 0.5; letter-spacing: 0.3em; }
        #custom-cursor {
            width: 8px; height: 8px; background: var(--awake-blue); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 10000;
            filter: blur(1px); transition: transform 0.1s linear; opacity: 0.8;
            margin-left: -4px; margin-top: -4px;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div id="canvas-container"></div>

    <div id="overlay-entry">
        <div style="margin-bottom: 30px; width: 1px; height: 60px; background: var(--awake-blue); opacity: 0.4;"></div>
        <button id="enter-btn" class="btn">ENTER 724Hz</button>
        <p id="status-text" class="status">CALIBRATING FREQUENCY...</p>
    </div>

    <div class="ui-text mellow-title">Astro Time Candle</div>
    <div class="ui-text mellow-sub">Architect: Wei Jueran | Philadelphia | 14.0°C</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.161.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // v3 — pure Web Audio API, no THREE.Audio
        console.log('[724Hz] v3 init');

        const entry = document.getElementById('overlay-entry');
        const enterBtn = document.getElementById('enter-btn');
        const statusText = document.getElementById('status-text');
        const cursor = document.getElementById('custom-cursor');
        const container = document.getElementById('canvas-container');

        let scene, camera, renderer, candleShell, candleCore, particles;
        let audioCtx, sourceNode, analyserNode, audioBuffer;
        let isStarted = false;
        const particleCount = 10000;

        window.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const pt = new THREE.PointLight(0x83B3BE, 3, 50);
            pt.position.set(5, 5, 5);
            scene.add(pt);

            const candleGroup = new THREE.Group();
            const coreGeo = new THREE.CylinderGeometry(1.2, 1.2, 8.4, 32);
            const coreMat = new THREE.MeshStandardMaterial({ color: 0x4A5B61, metalness: 0.9, roughness: 0.1 });
            candleCore = new THREE.Mesh(coreGeo, coreMat);

            const shellGeo = new THREE.CylinderGeometry(3, 3, 9, 64);
            const shellMat = new THREE.MeshPhysicalMaterial({
                color: 0x83B3BE, transmission: 0.8, roughness: 0.14, thickness: 6,
                transparent: true, opacity: 0.9, emissive: 0x83B3BE, emissiveIntensity: 0.1
            });
            candleShell = new THREE.Mesh(shellGeo, shellMat);
            candleGroup.add(candleCore, candleShell);
            scene.add(candleGroup);

            createCosmicParticles();
            setupAudio();
            animate();
        }

        function createCosmicParticles() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(242, 242, 242, 1)');
            gradient.addColorStop(0.2, 'rgba(131, 179, 190, 0.8)');
            gradient.addColorStop(0.6, 'rgba(26, 28, 32, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            const particleTexture = new THREE.CanvasTexture(canvas);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount * 3; i++) positions[i] = (Math.random() - 0.5) * 40;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            particles = new THREE.Points(geometry, new THREE.PointsMaterial({
                size: 0.4, map: particleTexture, transparent: true, opacity: 0.7,
                blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
            }));
            scene.add(particles);
        }

        function setupAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // 低频切除：压雨声
            const lowCut = audioCtx.createBiquadFilter();
            lowCut.type = 'highpass';
            lowCut.frequency.value = 300;

            // 旋律增强
            const midBoost = audioCtx.createBiquadFilter();
            midBoost.type = 'peaking';
            midBoost.frequency.value = 3500;
            midBoost.Q.value = 1.0;
            midBoost.gain.value = 12;

            // 增益 6x
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 6.0;

            analyserNode = audioCtx.createAnalyser();
            analyserNode.fftSize = 32;

            // source → lowCut → midBoost → gainNode → analyserNode → destination
            lowCut.connect(midBoost);
            midBoost.connect(gainNode);
            gainNode.connect(analyserNode);
            analyserNode.connect(audioCtx.destination);
            window._chainHead = lowCut;

            fetch('https://mellowwei.github.io/AstroTimeCandle/winter_sun.m4a')
                .then(res => res.arrayBuffer())
                .then(buf => audioCtx.decodeAudioData(buf))
                .then(decoded => {
                    audioBuffer = decoded;
                    statusText.innerText = '724Hz ALIGNED. READY TO AWAKE.';
                    statusText.style.color = '#83B3BE';
                    statusText.style.opacity = '1';
                    console.log('[724Hz] v3 decoded. Ready.');
                })
                .catch(err => {
                    console.error('[724Hz] Audio error:', err);
                    statusText.innerText = 'AUDIO UNAVAILABLE — VISUAL MODE';
                    statusText.style.color = '#FFBB00';
                    statusText.style.opacity = '1';
                    enterBtn.innerText = 'ENTER (SILENT)';
                });
        }

        function getFrequency() {
            if (!analyserNode) return 0;
            const data = new Uint8Array(analyserNode.frequencyBinCount);
            analyserNode.getByteFrequencyData(data);
            return data.reduce((a, b) => a + b, 0) / data.length;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (candleShell) candleShell.rotation.y += 0.00724;
            if (particles) {
                particles.rotation.y += 0.001;
                particles.rotation.z += 0.0005;
            }
            if (isStarted) {
                const freq = getFrequency();
                if (candleShell) candleShell.material.emissiveIntensity = 0.1 + (freq / 100);
            }
            renderer.render(scene, camera);
        }

        enterBtn.addEventListener('click', async () => {
            if (isStarted) return;
            isStarted = true;

            if (audioCtx && audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            if (audioBuffer) {
                sourceNode = audioCtx.createBufferSource();
                sourceNode.buffer = audioBuffer;
                sourceNode.loop = true;
                sourceNode.connect(window._chainHead);
                sourceNode.start(0);
                console.log('[724Hz] v3 playing.');
            }

            entry.style.opacity = '0';
            setTimeout(() => entry.style.display = 'none', 1200);
        });

        init();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
